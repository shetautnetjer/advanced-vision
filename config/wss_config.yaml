# WebSocket Server Configuration for Advanced Vision (v2)
# Topic-Based Architecture on Single Port 8000
#
# v2 Architecture:
#   All feeds use single WebSocket server on port 8000
#   Messages are routed by topic:
#     - vision.capture.raw       - Screen Capture (Raw Frames)
#     - vision.detection.yolo    - YOLO Detector (Boxes + Classes)
#     - vision.segmentation.sam  - MobileSAM (Segmentations)
#     - vision.classification.eagle - Eagle Vision (Classifications)
#     - vision.analysis.qwen     - Chronos/Kimi (Analysis Results)

# Server configuration
server:
  host: "0.0.0.0"
  port: 8000
  ping_interval: 20
  ping_timeout: 10
  close_timeout: 5
  compression: true
  max_clients: 200

# Topic configurations
topics:
  - name: "vision.capture.raw"
    description: "Screen Capture - Raw Frames"
    binary_support: true
    json_support: true
    max_clients: 50
    
  - name: "vision.detection.yolo"
    description: "YOLO Detector - Boxes + Classes"
    binary_support: false
    json_support: true
    max_clients: 50
    
  - name: "vision.segmentation.sam"
    description: "MobileSAM - Segmentations"
    binary_support: false
    json_support: true
    max_clients: 50
    
  - name: "vision.classification.eagle"
    description: "Eagle Vision - Classifications"
    binary_support: false
    json_support: true
    max_clients: 100
    
  - name: "vision.analysis.qwen"
    description: "Chronos/Kimi - Analysis Results"
    binary_support: false
    json_support: true
    max_clients: 100

# Legacy port mappings (for reference during migration)
# Port 8001 → vision.capture.raw
# Port 8002 → vision.detection.yolo
# Port 8003 → vision.segmentation.sam
# Port 8004 → vision.classification.eagle
# Port 8005 → vision.analysis.qwen

# Schema routing configuration
schemas:
  ui:
    enabled: true
    topics:
      - "vision.capture.raw"
      - "vision.classification.eagle"
    keywords:
      - button
      - form
      - navigation
      - input
      - click
      - ui
      - interface
      
  trading:
    enabled: true
    topics:
      - "vision.analysis.qwen"
    keywords:
      - signal
      - trend
      - pattern
      - breakout
      - support
      - resistance
      - entry
      - stop
      - target
      - risk
      - reward
      - price
      - chart

# Logging configuration
logging:
  text_log: "wss-feed-text.log"
  json_log: "wss-feed-classifications.json"
  image_dir: "frames"
  log_level: "INFO"
  max_file_size_mb: 100
  max_backup_files: 5

# Client defaults
client:
  auto_reconnect: true
  reconnect_delay: 1.0
  max_reconnect_delay: 30.0
  reconnect_backoff: 2.0
  max_retries: 0  # 0 = unlimited
